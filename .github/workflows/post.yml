name: Telegram Deal Bot

on:
  schedule:
    - cron: "30 4 * * *"    # 10:00 IST
    - cron: "30 9 * * *"    # 15:00 IST
    - cron: "30 14 * * *"   # 20:00 IST  (evening - peak shopping)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deal-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Post a deal
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          AMAZON_ASSOC_TAG: ${{ secrets.AMAZON_ASSOC_TAG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DO_POST: "true"
        run: python main.py
      - name: Persist posted flags
        if: always()
        run: |
          git config user.name "deal-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add deals.json || true
          git commit -m "chore: mark posted deal [skip ci]" || echo "no change"
          git push || echo "nothing to push"
